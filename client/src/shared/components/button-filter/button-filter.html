<button
  class="btn btn-soft border-gray-300 bg-white btn-sm sm:btn-sm md:btn-md hover:border-primary hover:bg-primary hover:text-white font-alt text-base"
  [ngClass]="{
    'btn-primary': isActive,
  }"
>
  @if (icon) {
    <fa-icon [icon]="icon" class="mr-2"></fa-icon>
  }
  {{ label }}
</button>
