<div class="w-full max-w-sm mx-auto card overflow-hidden drop-shadow-sm bg-white p-4">
  <div class="px-6 py-4">
    <div class="flex justify-center mx-auto">
      <img class="w-auto sm:h-8" src="/assets/images/logo/peps.svg" alt="Pep's logo" />
    </div>

    <h3 class="mt-3 text-xl font-medium text-center text-primary">Bienvenue !</h3>

    <p class="mt-2 text-center">Connectez-vous à votre compte</p>

    <form>
      <div class="w-full mt-4">
        <input
          class="block w-full px-6 py-3 mt-2 input focus:ring-2 focus:ring-primary focus:outline-none"
          type="email"
          placeholder="Adresse email"
          aria-label="Email Address"
        />
      </div>

      <div class="w-full mt-4">
        <input
          class="block w-full px-6 py-3 mt-2 input focus:ring-2 focus:ring-primary focus:outline-none"
          type="password"
          placeholder="Mot de passe"
          aria-label="Password"
        />
      </div>

      <div class="flex flex-col gap-4 items-center justify-between mt-4">
        <!-- <a href="#" class="text-sm">Mot de passe oublié ?</a> -->

        <button
          class="px-6 py-2 text-sm btn btn-soft btn-primary font-medium tracking-wide transition-colors duration-300 transform"
        >
          Se connecter
        </button>
      </div>
    </form>
  </div>

  <div class="flex items-center justify-center py-2 text-center">
    <span class="text-sm">Vous n'avez pas de compte ? </span>

    <a [routerLink]="['/register']" class="mx-2 text-sm font-bold text-primary hover:text-secondary"
      >Créer un compte</a
    >
  </div>
</div>
