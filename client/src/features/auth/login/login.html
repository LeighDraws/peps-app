<div class="w-full md:min-w-lg max-w-sm mx-auto card overflow-hidden drop-shadow-sm bg-white p-4">
  <div class="px-6 py-4">
    <div class="flex justify-center mx-auto">
      <img class="w-auto sm:h-8" src="/assets/images/logo/peps.svg" alt="Pep's logo" />
    </div>

    <h3 class="mt-3 text-xl font-medium text-center text-primary">Bienvenue !</h3>

    <p class="mt-2 text-center">Connectez-vous à votre compte</p>

    <form (ngSubmit)="onSubmit()">
      @if (errorMessage()) {
        <div class="alert alert-error text-sm py-2 mt-4">
          <fa-icon [icon]="faCircleXmark"></fa-icon>
          <span>{{ errorMessage() }}</span>
        </div>
      }

      <div class="w-full mt-4">
        <input
          class="block w-full px-6 py-3 mt-2 input focus:ring-2 focus:ring-primary focus:outline-none"
          type="email"
          name="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event); onInputChange()"
          placeholder="Adresse email"
          aria-label="Email Address"
          required
        />
      </div>

      <div class="w-full mt-4">
        <label
          class="flex w-full px-6 py-3 mt-2 input focus-within:border-none focus-within:ring-2 focus-within:ring-primary focus-within:outline-none"
        >
          <input
            class="grow justify-center align-middlering-0 outline-none border-none"
            [type]="showPassword() ? 'text' : 'password'"
            name="password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event); onInputChange()"
            placeholder="Mot de passe"
            aria-label="Password"
            required
          />

          <button
            type="button"
            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700 focus:outline-none"
            (click)="togglePassword()"
            aria-label="Afficher/Masquer le mot de passe"
          >
            <fa-icon
              [icon]="showPassword() ? faEyeSlash : faEye"
              class="text-lg hover:text-primary cursor-pointer"
            ></fa-icon>
          </button>
        </label>
      </div>

      <div class="flex flex-col gap-4 items-center justify-between mt-4">
        <!-- <a href="#" class="text-sm">Mot de passe oublié ?</a> -->

        <button
          type="submit"
          [disabled]="isLoading()"
          class="px-6 py-2 text-sm btn btn-soft btn-primary font-medium tracking-wide transition-colors duration-300 transform"
        >
          @if (isLoading()) {
            <span class="loading loading-spinner loading-xs"></span>
          }
          Se connecter
        </button>
      </div>
    </form>
  </div>

  <div class="flex items-center justify-center py-2 text-center">
    <span class="text-sm">Vous n'avez pas de compte ? </span>

    <a [routerLink]="['/register']" class="mx-2 text-sm font-bold text-primary hover:text-secondary"
      >Créer un compte</a
    >
  </div>
</div>
