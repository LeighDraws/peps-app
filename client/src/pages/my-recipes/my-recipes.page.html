<div class="container mx-auto p-4">
  <h1 class="text-3xl font-bold mb-6 text-center text-gray-800 dark:text-gray-200">
    Mes Recettes Favorites
  </h1>

  <!-- Error State -->
  <div
    *ngIf="errorMessage()"
    class="flex justify-center items-center my-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative"
    role="alert"
  >
    <strong class="font-bold">Erreur:</strong>
    <span class="block sm:inline ml-2">{{ errorMessage() }}</span>
  </div>

  <!-- No Favorites State -->
  <div
    *ngIf="favoriteRecipes().length === 0 && !errorMessage()"
    class="flex justify-center items-center h-64 text-center"
  >
    <div>
      <p class="text-lg text-gray-600 dark:text-gray-400">
        Vous n'avez pas encore de recettes favorites.
      </p>
      <button
        routerLink="/home"
        class="mt-4 px-6 py-2 bg-primary-600 hover:bg-primary-700 text-white font-semibold rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-primary-400 focus:ring-opacity-75"
      >
        Découvrir des recettes
      </button>
    </div>
  </div>

  <!-- Recipe Grid -->
  <div
    *ngIf="favoriteRecipes().length > 0"
    class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"
  >
    <div *ngFor="let recipe of favoriteRecipes()" class="recipe-card-wrapper">
      <app-recipe-card
        [recipe]="recipe"
        [isFavorite]="isRecipeFavorite(recipe.id)"
        (favoriteClick)="onFavoriteClick(recipe)"
      ></app-recipe-card>
    </div>
  </div>
</div>
