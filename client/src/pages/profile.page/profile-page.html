<div class="container mx-auto p-4 md:p-8">
  <div class="card bg-white drop-shadow-sm max-w-2xl mx-auto rounded-(--big) p-6">
    <div class="card-body items-center text-center">
      <!-- AVATAR -->
      <div class="avatar mb-6">
        <div class="w-32 rounded-full ring-4 ring-primary ring-offset-base-100 ring-offset-2">
          <img
            [src]="
              user()?.avatarUrl || 'https://img.daisyui.com/images/profile/demo/yellingcat@192.webp'
            "
            alt="User avatar"
          />
        </div>
      </div>

      <!-- PSEUDO & EMAIL -->
      <h2 class="font-fancy text-5xl! mb-0 text-primary">{{ user()?.pseudo }}</h2>
      <p class="text-base-content/60 font-main">{{ user()?.email }}</p>

      <div class="divider my-8"></div>

      <!-- INFOS DÉTAILLÉES -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full text-left">
        <div class="flex flex-col gap-1">
          <span class="text-xs font-bold uppercase tracking-wider text-secondary"
            >Membre depuis</span
          >
          <p class="font-main font-medium text-lg">
            {{ user()?.createdAt | date: 'longDate' }}
          </p>
        </div>

        <div class="flex flex-col gap-1">
          <span class="text-xs font-bold uppercase tracking-wider text-secondary"
            >Méthode d'inscription</span
          >
          <p class="font-main font-medium text-lg lowercase">
            {{ user()?.authProvider }}
          </p>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="card-actions justify-end mt-12 w-full gap-4">
        <button class="btn btn-outline btn-primary px-6" disabled>Modifier les infos</button>
        <button class="btn btn-primary px-8 shadow-md" disabled>Paramètres</button>
      </div>
    </div>
  </div>
</div>
